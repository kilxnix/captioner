name: Build Debug APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Ensure stable debug keystore
        # If the repo has no committed debug keystore, generate one and commit it.
        # This gives every subsequent build the same signing key, so APKs install
        # over each other without "package appears to be invalid" signature conflicts.
        run: |
          set -e
          if [ ! -f app/debug.keystore ]; then
            echo "No app/debug.keystore found — generating and committing one."
            keytool -genkeypair -v \
              -keystore app/debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA -keysize 2048 -validity 10950 \
              -dname "CN=ColesLog Debug, OU=Dev, O=Sheltron, L=NA, S=NA, C=US"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add app/debug.keystore
            git commit -m "ci: commit stable debug keystore for reproducible APK signing"
            git push origin HEAD:${GITHUB_REF#refs/heads/}
            echo "KEYSTORE_FRESHLY_COMMITTED=1" >> $GITHUB_ENV
          else
            echo "Using existing app/debug.keystore."
          fi

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk artifacts/captioner-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: captioner-debug-apk
          path: artifacts/captioner-debug.apk
          retention-days: 30
